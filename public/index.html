<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Dashboard — WebRTC Chat by RCE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080e;
      --surface: #12121e;
      --surface-2: #1a1a2e;
      --surface-3: #222238;
      --border: #2a2a42;
      --text: #e8e8f0;
      --text-muted: #7878a0;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.25);
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, 0.25);
      --red: #ef4444;
      --yellow: #eab308;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Background ─────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
      z-index: 0;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: relative; z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(18, 18, 30, 0.8);
      backdrop-filter: blur(20px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px var(--primary-glow);
    }

    .header-icon svg { width: 20px; height: 20px; color: white; }

    .header-title {
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
    }

    .header-sub {
      font-size: 0.7rem; color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .conn-status {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; color: var(--text-muted);
    }

    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    .conn-dot.disconnected {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: none;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Main ────────────────────────────────── */
    .main {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-label {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px;
      padding: 0 6px;
      background: var(--primary);
      border-radius: 999px;
      font-size: 0.65rem; font-weight: 700; color: white;
    }

    /* ── Client grid ─────────────────────────── */
    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .client-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .client-card:hover {
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }

    .client-card.in-call {
      border-color: rgba(234, 179, 8, 0.4);
      box-shadow: 0 4px 24px rgba(234, 179, 8, 0.1);
    }

    .client-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .client-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .client-avatar {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .client-name {
      font-size: 0.95rem; font-weight: 600;
    }

    .client-meta {
      font-size: 0.75rem; color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      font-size: 0.7rem; font-weight: 600;
    }

    .badge-online {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: var(--green);
    }

    .badge-in-call {
      background: rgba(234, 179, 8, 0.12);
      border: 1px solid rgba(234, 179, 8, 0.25);
      color: var(--yellow);
    }

    .badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    .badge-online .dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    .badge-in-call .dot {
      background: var(--yellow);
      box-shadow: 0 0 6px rgba(234, 179, 8, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Call button */
    .call-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, var(--green), #16a34a);
      color: white;
      box-shadow: 0 4px 16px var(--green-glow);
    }

    .call-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
    }

    .call-btn:active { transform: translateY(0); }

    .call-btn svg { width: 18px; height: 18px; }

    .call-btn.busy {
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      box-shadow: none;
      cursor: default;
    }

    .call-btn.busy:hover {
      transform: none;
      box-shadow: none;
    }

    /* ── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-icon {
      width: 80px; height: 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
    }

    .empty-icon svg {
      width: 36px; height: 36px; color: var(--text-muted); opacity: 0.5;
    }

    .empty-title {
      font-size: 1.1rem; font-weight: 600; color: var(--text);
      margin-bottom: 0.5rem;
    }

    .empty-sub {
      font-size: 0.85rem; max-width: 360px; margin: 0 auto; line-height: 1.5;
    }

    /* ── Transcript link ──────────────────── */
    .transcript-link {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .transcript-link:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .transcript-link svg { width: 14px; height: 14px; }

    .client-actions {
      display: flex; gap: 0.5rem;
    }

    .client-actions .call-btn { flex: 1; }

    /* ── Transcript modal ─────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 640px;
      max-height: 80vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 { font-size: 1rem; font-weight: 700; }

    .modal-close {
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 0.25rem;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body {
      flex: 1; overflow-y: auto; padding: 1.5rem;
    }

    .call-transcript {
      margin-bottom: 1.5rem;
    }

    .call-transcript-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      font-size: 0.8rem;
    }

    .call-transcript-header .call-date { font-weight: 600; }
    .call-transcript-header .call-duration { color: var(--text-muted); }

    .call-entries {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }

    .entry {
      font-size: 0.82rem; line-height: 1.5;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(42, 42, 66, 0.3);
    }

    .entry:last-child { border-bottom: none; }

    .entry .entry-speaker {
      font-weight: 600; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .entry .entry-speaker.staff { color: var(--primary); }
    .entry .entry-speaker.client { color: var(--green); }

    .entry .entry-time {
      float: right; font-size: 0.6rem; color: var(--text-muted);
    }

    .no-transcripts {
      text-align: center; color: var(--text-muted);
      padding: 2rem; font-size: 0.9rem;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 640px) {
      .header { padding: 1rem 1.25rem; }
      .main { padding: 1.25rem; }
      .client-grid { grid-template-columns: 1fr; }
      .modal-overlay { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <div>
        <div class="header-title">WebRTC Chat by RCE</div>
        <div class="header-sub">Staff Dashboard</div>
      </div>
    </div>
    <div class="conn-status">
      <span class="conn-dot" id="connDot"></span>
      <span id="connText">Connecting…</span>
    </div>
  </div>

  <div class="main">
    <div class="section-label">
      Client Devices
      <span class="count-badge" id="clientCount">0</span>
    </div>

    <div id="clientGrid" class="client-grid">
      <!-- Populated by JS -->
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div class="empty-title">No client devices online</div>
      <div class="empty-sub">
        Client tablets will appear here automatically when they connect. Open the <strong>/client</strong> page on a tablet to register it.
      </div>
    </div>
  </div>

  <!-- Transcript modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Transcripts</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="no-transcripts">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    let ws;
    let reconnectAttempts = 0;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        reconnectAttempts = 0;
        setConnected(true);
        ws.send(JSON.stringify({ type: 'staff-subscribe' }));
      };

      ws.onmessage = (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }

        if (msg.type === 'client-list') {
          renderClients(msg.clients);
        }
      };

      ws.onclose = () => {
        setConnected(false);
        const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), 10000);
        reconnectAttempts++;
        setTimeout(connect, delay);
      };

      ws.onerror = () => {};
    }

    function setConnected(connected) {
      document.getElementById('connDot').classList.toggle('disconnected', !connected);
      document.getElementById('connText').textContent = connected ? 'Live' : 'Reconnecting…';
    }

    function renderClients(clients) {
      const grid = document.getElementById('clientGrid');
      const empty = document.getElementById('emptyState');
      const countEl = document.getElementById('clientCount');

      const onlineClients = clients.filter(c => c.online);
      countEl.textContent = onlineClients.length;

      if (onlineClients.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      grid.innerHTML = onlineClients.map(client => {
        const initials = client.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const connTime = timeAgo(client.connectedAt);
        const statusBadge = client.inCall
          ? `<div class="badge badge-in-call"><span class="dot"></span>In Call</div>`
          : `<div class="badge badge-online"><span class="dot"></span>Online</div>`;
        const callBtn = client.inCall
          ? `<button class="call-btn busy" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/>
              </svg>
              Currently in a call
            </button>`
          : `<button class="call-btn" onclick="callClient('${client.roomId}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
              Call ${client.name.split(' ')[0]}
            </button>`;

        const transcriptBtn = client.transcriptCount > 0
          ? `<button class="transcript-link" onclick="viewTranscripts('${client.roomId}', '${escapeHtml(client.name)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              ${client.transcriptCount} transcript${client.transcriptCount > 1 ? 's' : ''}
            </button>`
          : '';

        return `
          <div class="client-card ${client.inCall ? 'in-call' : ''}">
            <div class="client-top">
              <div class="client-info">
                <div class="client-avatar">${initials}</div>
                <div>
                  <div class="client-name">${escapeHtml(client.name)}</div>
                  <div class="client-meta">Connected ${connTime}</div>
                </div>
              </div>
              ${statusBadge}
            </div>
            <div class="client-actions">
              ${callBtn}
              ${transcriptBtn}
            </div>
          </div>
        `;
      }).join('');
    }

    function callClient(roomId) {
      window.location.href = '/' + roomId;
    }

    function timeAgo(ts) {
      const seconds = Math.floor((Date.now() - ts) / 1000);
      if (seconds < 60) return 'just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    connect();

    // ── Transcript modal ─────────────────────────
    async function viewTranscripts(roomId, clientName) {
      document.getElementById('modalTitle').textContent = `Transcripts — ${clientName}`;
      document.getElementById('modalBody').innerHTML = '<div class="no-transcripts">Loading…</div>';
      document.getElementById('modalOverlay').classList.add('open');

      try {
        const res = await fetch(`/api/transcripts/${roomId}`);
        const data = await res.json();

        if (!data.transcripts || data.transcripts.length === 0) {
          document.getElementById('modalBody').innerHTML = '<div class="no-transcripts">No transcripts yet</div>';
          return;
        }

        // Render transcripts (newest first)
        const html = data.transcripts.slice().reverse().map(call => {
          const date = new Date(call.startedAt).toLocaleString();
          const duration = call.endedAt
            ? formatDuration(call.endedAt - call.startedAt)
            : 'In progress';

          const entries = (call.entries || []).map(entry => {
            const time = new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const speakerClass = (entry.speaker || '').toLowerCase() === 'staff' ? 'staff' : 'client';
            return `<div class="entry">
              <span class="entry-time">${time}</span>
              <div class="entry-speaker ${speakerClass}">${escapeHtml(entry.speaker || 'Unknown')}</div>
              <div>${escapeHtml(entry.text)}</div>
            </div>`;
          }).join('');

          return `<div class="call-transcript">
            <div class="call-transcript-header">
              <span class="call-date">${date}</span>
              <span class="call-duration">${duration} • ${(call.entries || []).length} lines</span>
            </div>
            <div class="call-entries">
              ${entries || '<div class="no-transcripts" style="padding:1rem">No speech captured</div>'}
            </div>
          </div>`;
        }).join('');

        document.getElementById('modalBody').innerHTML = html;
      } catch (err) {
        document.getElementById('modalBody').innerHTML = '<div class="no-transcripts">Failed to load transcripts</div>';
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m`;
      if (m > 0) return `${m}m ${s % 60}s`;
      return `${s}s`;
    }

    // Close modal with Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
